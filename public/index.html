<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Player Lookup</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    input, button { padding: 0.4rem 0.6rem; font-size: 1rem; }
    .panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
    .panel { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; min-height: 120px; }
    .panel h3 { margin: 0 0 0.75rem; }
    .status { font-size: 0.85rem; color: #888; margin-bottom: 0.75rem; }
    .error { color: #c00; }
    dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 0.2rem 0.75rem; }
    dt { color: #555; font-size: 0.85rem; }
    dd { margin: 0; font-size: 0.85rem; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; font-size: 0.8rem; }
    th { text-align: left; color: #555; font-weight: normal; border-bottom: 1px solid #ccc; padding: 0.2rem 0.4rem; }
    td { padding: 0.2rem 0.4rem; }
    tr:nth-child(even) td { background: #f9f9f9; }
    .win { color: green; }
    .loss { color: #c00; }
  </style>
</head>
<body>
  <h1>Player Lookup</h1>

  <div>
    <input id="username" type="text" placeholder="Enter username" value="josh" />
    <button id="loadBtn">Load</button>
  </div>

  <div class="panels">
    <div class="panel">
      <h3>Player</h3>
      <div id="playerStatus" class="status">—</div>
      <div id="playerData"></div>
    </div>
    <div class="panel">
      <h3>Matches</h3>
      <div id="matchesStatus" class="status">—</div>
      <div id="matchesData"></div>
    </div>
    <div class="panel">
      <h3>Leaderboard</h3>
      <div id="leaderboardStatus" class="status">—</div>
      <div id="leaderboardData"></div>
    </div>
  </div>

  <script>
    const BASE = 'http://localhost:8787'

    function setStatus(id, text, isError = false) {
      const el = document.getElementById(id)
      el.textContent = text
      el.className = 'status' + (isError ? ' error' : '')
    }

    function renderPlayer(data) {
      return `<dl>
        <dt>Username</dt><dd>${data.username}</dd>
        <dt>Rank</dt><dd>${data.rank}</dd>
        <dt>Level</dt><dd>${data.level}</dd>
        <dt>Wins</dt><dd>${data.wins}</dd>
        <dt>Losses</dt><dd>${data.losses}</dd>
        <dt>Win rate</dt><dd>${data.winRate}%</dd>
      </dl>`
    }

    function renderMatches(data) {
      if (data.matches.length === 0) return '<p style="color:#888;font-size:0.85rem">No matches found.</p>'
      const rows = data.matches.map(m => {
        const mins = Math.floor(m.durationSeconds / 60)
        return `<tr>
          <td class="${m.result}">${m.result}</td>
          <td>${m.map}</td>
          <td>${m.kills}/${m.deaths}</td>
          <td>${m.kd}</td>
          <td>${mins}m</td>
        </tr>`
      }).join('')
      return `<table>
        <thead><tr><th>Result</th><th>Map</th><th>K/D</th><th>Ratio</th><th>Duration</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`
    }

    function renderLeaderboard(data) {
      const rows = data.entries.map(e => `<tr>
        <td>${e.rank}</td>
        <td>${e.username}</td>
        <td>${e.score}</td>
      </tr>`).join('')
      return `<p style="font-size:0.85rem;margin:0 0 0.5rem">${data.name}</p>
      <table>
        <thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`
    }

    async function loadPlayer(username) {
      setStatus('playerStatus', 'Loading…')
      document.getElementById('playerData').innerHTML = ''
      try {
        const res = await fetch(`${BASE}/player/${username}`)
        const data = await res.json()
        if (!res.ok) throw new Error(`${res.status} — ${data.error}`)
        setStatus('playerStatus', '200 OK')
        document.getElementById('playerData').innerHTML = renderPlayer(data)
      } catch (err) {
        setStatus('playerStatus', err.message, true)
      }
    }

    async function loadMatches(username) {
      setStatus('matchesStatus', 'Loading…')
      document.getElementById('matchesData').innerHTML = ''
      try {
        const res = await fetch(`${BASE}/player/${username}/matches`)
        const data = await res.json()
        if (!res.ok) throw new Error(`${res.status} — ${data.error}`)
        setStatus('matchesStatus', `200 OK — ${data.matches.length} match(es)`)
        document.getElementById('matchesData').innerHTML = renderMatches(data)
      } catch (err) {
        setStatus('matchesStatus', err.message, true)
      }
    }

    async function loadLeaderboard() {
      setStatus('leaderboardStatus', 'Loading…')
      document.getElementById('leaderboardData').innerHTML = ''
      try {
        const res = await fetch(`${BASE}/leaderboard`)
        const data = await res.json()
        if (!res.ok) throw new Error(`${res.status} — ${data.error}`)
        setStatus('leaderboardStatus', `200 OK — ${data.entries.length} entries`)
        document.getElementById('leaderboardData').innerHTML = renderLeaderboard(data)
      } catch (err) {
        setStatus('leaderboardStatus', err.message, true)
      }
    }

    document.getElementById('loadBtn').addEventListener('click', () => {
      const username = document.getElementById('username').value.trim()
      if (!username) return
      loadPlayer(username)
      loadMatches(username)
      loadLeaderboard()
    })
  </script>
</body>
</html>
